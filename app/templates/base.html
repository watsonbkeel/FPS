<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tamapet{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">Tamapet</a>
      <nav class="nav-links">
        {% if current_user %}
          <a href="/dashboard">控制台</a>
          <a href="/shop">商店</a>
          <a href="/circles">圈子</a>
          <form method="post" action="/logout" class="inline-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="link-button">退出</button>
          </form>
        {% else %}
          <a href="/register">注册</a>
          <a href="/login">登录</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="page-shell {% block page_shell_class %}{% endblock %}">
    {% if flashes %}
      <section class="flash-stack">
        {% for item in flashes %}
          <div class="flash flash-{{ item.category }}">{{ item.message }}</div>
        {% endfor %}
      </section>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
